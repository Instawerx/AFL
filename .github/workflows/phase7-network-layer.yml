name: AFL Phase7 Network Layer

on:
  workflow_dispatch:
  push:
    branches: [ main, integration ]
    paths:
      - 'build/**'
      - 'tests/runtime/**'
      - '.github/workflows/phase7-network-layer.yml'

jobs:
  network-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: python -m pip install pyyaml

      - name: Run network smoke
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\scripts\run_network_session_smoke.ps1 -RepoRoot . -Port 9007 -Scenario .\tests\runtime\scenarios\network_quickmatch.yaml
