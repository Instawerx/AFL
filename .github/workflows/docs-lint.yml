name: Docs Lint

on:
  pull_request:
  push:
    branches: [main, integration]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Validate repo structure
        run: python build/scripts/validate_repo.py
      - name: Validate naming
        run: python build/scripts/validate_naming.py
      - name: Validate agent registry
        run: python build/scripts/validate_agents.py
