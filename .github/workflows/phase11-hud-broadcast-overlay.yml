name: AFL Phase11 HUD Broadcast Overlay

on:
  workflow_dispatch:
  push:
    branches: [ main, integration ]
    paths:
      - 'build/**'
      - 'tests/runtime/**'
      - '.github/workflows/phase11-hud-broadcast-overlay.yml'

jobs:
  broadcast-overlay-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed authoritative state
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\runtime | Out-Null
          Copy-Item .\tests\runtime\scenarios\authoritative_state_broadcast_seed.json .\artifacts\runtime\authoritative_state_snapshot.json -Force

      - name: Build broadcast overlay artifacts
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\scripts\run_broadcast_overlay_build.ps1 -RepoRoot . -StateFile .\artifacts\runtime\authoritative_state_snapshot.json -OutputDir .\artifacts\broadcast

      - name: Build match director artifacts
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\scripts\run_match_director_sim.ps1 -RepoRoot . -StateFile .\artifacts\runtime\authoritative_state_snapshot.json -OutputDir .\artifacts\broadcast
