name: AFL Phase25 Runtime

on:
  workflow_dispatch:
  push:
    branches: [ main, integration ]
    paths:
      - 'build/**'
      - 'tests/runtime/**'
      - '.github/workflows/phase25-runtime.yml'

jobs:
  runtime-harness:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: python -m pip install pyyaml

      - name: Run runtime harness
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\scripts\run_queue_reward_harness.ps1 -RepoRoot . -Scenario .\tests\runtime\scenarios\quickmatch_reward.yaml
